# Digital Brain Pipeline - Runtime Configuration

vault:
  path: ~/Desktop/claude-vault-output
  # Subfolder structure within the vault for generated notes
  folders:
    conversations: "AI-Conversations"
    entities: "Entities"
    concepts: "Concepts"
    projects: "Projects"
    contacts: "Contacts"
    decisions: "Decisions"
    action_items: "Action-Items"
    calendar: "Calendar"

ingest:
  # Directories to scan for export files
  sources:
    claude: ~/Desktop/claude-export
    # Path to a Google Calendar JSON export produced by scripts/export_calendar.py
    # Set to null or omit to skip calendar ingestion
    calendar: ~/Desktop/calendar-export
  # Skip conversations (or calendar days) shorter than this many messages/events
  min_messages: 2
  calendar:
    # Minimum events per day to include that day's schedule note
    min_events_per_day: 1
    # Vault subfolder for calendar notes
    folder: "Calendar"

processing:
  # Confidence threshold for entity/concept extraction (0.0 to 1.0)
  confidence_threshold: 0.5
  # Maximum number of topics to assign per conversation
  max_topics_per_conversation: 5
  # Enable deduplication of entities across conversations
  deduplicate_entities: true

output:
  obsidian:
    # Add Dataview-compatible inline fields
    dataview_fields: true
    # Include backlinks section at bottom of notes
    backlinks_section: true
    # Tag prefix for auto-generated tags
    tag_prefix: "ai-brain"
    # Date format for frontmatter
    date_format: "%Y-%m-%d"
    # Wikilink style: "wikilink" for [[note]] or "markdown" for [note](note.md)
    link_style: "wikilink"

curation:
  # Stage 4a: score each conversation for depth and quality
  enable_source_scoring: true
  # Stage 4b: fuzzy entity deduplication across the full corpus
  enable_entity_resolution: true
  # Stage 4c: detect superseded decisions and completed action items
  enable_temporal_tracking: true
  # Stage 4d: flag contradictory decisions and insights
  enable_contradiction_detection: true
  # Confidence below this threshold triggers a needs_review flag
  min_review_confidence: 0.6
  # Minimum name similarity to merge two entities (0.0–1.0)
  entity_similarity_threshold: 0.85

logging:
  level: INFO
  file: ~/.local/share/digital-brain-pipeline/pipeline.log
